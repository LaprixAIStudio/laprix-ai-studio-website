<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Laprix Chat Admin – beszélgetések</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: rgba(15, 23, 42, 0.86);
      --panel2: rgba(30, 41, 59, 0.78);
      --text: #eef6ff;
      --muted: #aebbd0;
      --line: rgba(148, 163, 184, 0.18);
      --accent: #38d9ff;
      --accent2: #9d7cff;
      --ok: #34d399;
      --warn: #facc15;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 10%, rgba(56, 217, 255, .12), transparent 32%),
        radial-gradient(circle at 90% 20%, rgba(157, 124, 255, .14), transparent 34%),
        var(--bg);
      color: var(--text);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(7, 17, 31, .92);
      backdrop-filter: blur(18px);
    }
    .wrap { width: min(1280px, calc(100% - 32px)); margin: 0 auto; }
    .top {
      display: flex;
      gap: 18px;
      align-items: center;
      justify-content: space-between;
      min-height: 74px;
    }
    h1 { font-size: clamp(1.25rem, 3vw, 2rem); margin: 0; letter-spacing: -.04em; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--muted);
      font-size: .86rem;
    }
    .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--ok); }
    .login {
      display: grid;
      gap: 10px;
      grid-template-columns: minmax(220px, 1fr) minmax(220px, 1fr) auto;
      padding: 18px 0;
      border-top: 1px solid var(--line);
    }
    input, button, select {
      min-height: 42px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, .78);
      color: var(--text);
      padding: 0 12px;
      font: inherit;
    }
    button {
      cursor: pointer;
      font-weight: 800;
      border: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #06111f;
    }
    main { padding: 26px 0 46px; }
    .grid {
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 18px;
      align-items: start;
    }
    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 22px 60px rgba(0,0,0,.28);
    }
    .panel-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }
    .panel-head strong { font-size: 1.02rem; }
    .sessions {
      max-height: calc(100vh - 210px);
      overflow: auto;
    }
    .session-item {
      width: 100%;
      display: block;
      text-align: left;
      padding: 14px 16px;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      color: var(--text);
      cursor: pointer;
    }
    .session-item:hover, .session-item.active { background: rgba(56, 217, 255, .08); }
    .session-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font-weight: 900;
    }
    .session-meta, .session-snippet {
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.38;
    }
    .lead-pill {
      color: #04111f;
      background: var(--warn);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: .74rem;
      font-weight: 900;
      white-space: nowrap;
    }
    .messages {
      padding: 18px;
      min-height: 420px;
      max-height: calc(100vh - 210px);
      overflow: auto;
    }
    .empty {
      color: var(--muted);
      padding: 28px;
      text-align: center;
    }
    .msg {
      max-width: 780px;
      margin: 0 0 12px;
      padding: 13px 15px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel2);
      white-space: pre-wrap;
      line-height: 1.48;
    }
    .msg.user {
      margin-left: auto;
      background: rgba(56, 217, 255, .10);
      border-color: rgba(56, 217, 255, .22);
    }
    .msg.assistant {
      margin-right: auto;
      background: rgba(157, 124, 255, .10);
      border-color: rgba(157, 124, 255, .22);
    }
    .msg.system {
      margin-left: auto;
      margin-right: auto;
      text-align: center;
      background: rgba(250, 204, 21, .10);
      border-color: rgba(250, 204, 21, .24);
      color: #fff4bf;
    }
    .msg small {
      display: block;
      color: var(--muted);
      margin-bottom: 6px;
      font-size: .75rem;
    }
    .session-details {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: .88rem;
      line-height: 1.5;
    }
    .session-details a { color: var(--accent); }
    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .secondary {
      background: rgba(255,255,255,.07);
      color: var(--text);
      border: 1px solid var(--line);
    }
    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
      .login { grid-template-columns: 1fr; }
      .sessions, .messages { max-height: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="top">
        <div>
          <h1>Laprix Chat Admin</h1>
          <div class="badge"><span class="dot"></span> V1.22 megtekintő mód – emberi átvétel még nincs bekapcsolva</div>
        </div>
        <div class="toolbar">
          <button class="secondary" id="refreshBtn">Frissítés</button>
          <a class="badge" href="/" style="text-decoration:none">← Főoldal</a>
        </div>
      </div>

      <div class="login">
        <input id="apiBase" placeholder="Backend API URL, pl. https://laprix-ai-chat-backend.onrender.com" />
        <input id="adminToken" type="password" placeholder="Admin token" />
        <button id="saveBtn">Mentés és betöltés</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="grid">
      <section class="panel">
        <div class="panel-head">
          <strong>Beszélgetések</strong>
          <span id="sessionCount" class="badge">0 db</span>
        </div>
        <div id="sessions" class="sessions">
          <div class="empty">Add meg a backend URL-t és az admin tokent.</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <strong id="activeTitle">Beszélgetés részletei</strong>
          <span class="badge" id="autoRefreshState">auto frissítés: 10 mp</span>
        </div>
        <div id="sessionDetails" class="session-details">Válassz egy beszélgetést bal oldalt.</div>
        <div id="messages" class="messages">
          <div class="empty">Nincs kiválasztott beszélgetés.</div>
        </div>
      </section>
    </div>
  </main>

  <script src="/chat-config.js"></script>
  <script>
    const config = window.LAPRIX_CHAT_CONFIG || {};
    const defaultApi = (config.apiBaseUrl || "").replace(/\/$/, "");

    const apiBaseInput = document.getElementById("apiBase");
    const tokenInput = document.getElementById("adminToken");
    const sessionsEl = document.getElementById("sessions");
    const messagesEl = document.getElementById("messages");
    const detailsEl = document.getElementById("sessionDetails");
    const sessionCountEl = document.getElementById("sessionCount");
    const activeTitleEl = document.getElementById("activeTitle");

    let activeSessionId = "";
    let sessions = [];

    apiBaseInput.value = localStorage.getItem("laprix_admin_api_base") || defaultApi;
    tokenInput.value = localStorage.getItem("laprix_admin_token") || "";

    function esc(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getApiBase() {
      return apiBaseInput.value.replace(/\/$/, "").trim();
    }

    function getToken() {
      return tokenInput.value.trim();
    }

    async function apiGet(path) {
      const apiBase = getApiBase();
      const token = getToken();
      if (!apiBase || !token) throw new Error("Hiányzik az API URL vagy admin token.");

      const response = await fetch(apiBase + path, {
        headers: { Authorization: "Bearer " + token },
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error("HTTP " + response.status + " – " + text.slice(0, 180));
      }
      return response.json();
    }

    function renderSessions() {
      sessionCountEl.textContent = sessions.length + " db";
      if (!sessions.length) {
        sessionsEl.innerHTML = '<div class="empty">Még nincs mentett beszélgetés.</div>';
        return;
      }

      sessionsEl.innerHTML = sessions.map((s) => {
        const title = s.leadSubmitted
          ? `${esc(s.leadName || "Ajánlatkérő")} ${s.leadEmail ? " – " + esc(s.leadEmail) : ""}`
          : esc((s.lastUserMessage || "Névtelen beszélgetés").slice(0, 64));

        return `
          <button class="session-item ${s.sessionId === activeSessionId ? "active" : ""}" data-session-id="${esc(s.sessionId)}">
            <div class="session-title">
              <span>${title}</span>
              ${s.leadSubmitted ? '<span class="lead-pill">AJÁNLAT</span>' : ''}
            </div>
            <div class="session-meta">${esc(s.lastAt || "")} · ${Number(s.messageCount || 0)} üzenet · ${esc(s.projectType || "")}</div>
            <div class="session-snippet">${esc((s.lastAssistantReply || s.lastUserMessage || "").slice(0, 120))}</div>
          </button>
        `;
      }).join("");

      document.querySelectorAll(".session-item").forEach((btn) => {
        btn.addEventListener("click", () => loadSession(btn.dataset.sessionId));
      });
    }

    async function loadSessions() {
      try {
        const data = await apiGet("/api/admin/chat-sessions?limit=100");
        sessions = data.items || [];
        renderSessions();
        if (activeSessionId) {
          loadSession(activeSessionId, true);
        }
      } catch (error) {
        sessionsEl.innerHTML = `<div class="empty">Hiba: ${esc(error.message)}</div>`;
      }
    }

    async function loadSession(sessionId, silent = false) {
      if (!sessionId) return;
      activeSessionId = sessionId;
      if (!silent) {
        messagesEl.innerHTML = '<div class="empty">Betöltés...</div>';
      }
      renderSessions();

      try {
        const data = await apiGet("/api/admin/chat-sessions/" + encodeURIComponent(sessionId));
        const s = data.session || {};
        activeTitleEl.textContent = s.leadSubmitted ? "Ajánlatkéréses beszélgetés" : "Beszélgetés";

        detailsEl.innerHTML = `
          <strong>Session:</strong> ${esc(s.sessionId)}<br>
          ${s.leadName ? `<strong>Név:</strong> ${esc(s.leadName)}<br>` : ""}
          ${s.leadEmail ? `<strong>E-mail:</strong> ${esc(s.leadEmail)}<br>` : ""}
          ${s.projectType ? `<strong>Típus:</strong> ${esc(s.projectType)}<br>` : ""}
          ${s.pageUrl ? `<strong>Oldal:</strong> <a href="${esc(s.pageUrl)}" target="_blank" rel="noreferrer">${esc(s.pageTitle || s.pageUrl)}</a><br>` : ""}
          ${s.ip ? `<strong>IP:</strong> ${esc(s.ip)}<br>` : ""}
        `;

        const messages = data.messages || [];
        if (!messages.length) {
          messagesEl.innerHTML = '<div class="empty">Ehhez a sessionhöz nincs üzenet.</div>';
          return;
        }

        messagesEl.innerHTML = messages.map((m) => `
          <div class="msg ${esc(m.role)}">
            <small>${esc(m.role)} · ${esc(m.at || "")}</small>
            ${esc(m.content || "")}
          </div>
        `).join("");
        messagesEl.scrollTop = messagesEl.scrollHeight;
      } catch (error) {
        messagesEl.innerHTML = `<div class="empty">Hiba: ${esc(error.message)}</div>`;
      }
    }

    document.getElementById("saveBtn").addEventListener("click", () => {
      localStorage.setItem("laprix_admin_api_base", getApiBase());
      localStorage.setItem("laprix_admin_token", getToken());
      loadSessions();
    });

    document.getElementById("refreshBtn").addEventListener("click", loadSessions);

    if (apiBaseInput.value && tokenInput.value) {
      loadSessions();
    }

    setInterval(() => {
      if (apiBaseInput.value && tokenInput.value) loadSessions();
    }, 10000);
  </script>
</body>
</html>
